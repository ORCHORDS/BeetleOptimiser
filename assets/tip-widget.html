<!--
  ORCHORDS Tip Jar — floating widget
  Drop this anywhere in your README or HTML page. Pure client-side, no CDN, no network calls.
  Requires: /assets/qr-sol.png, /assets/qr-eth.png, /assets/qr-btc.png in the same directory.
-->
<div id="orchords-tip" aria-label="Support ORCHORDS">
  <button type="button" id="orchords-tip-btn" aria-expanded="false" aria-controls="orchords-tip-panel">
    <span aria-hidden="true">☕</span>
    <span class="orchords-tip-label">Tip jar</span>
  </button>
  <div id="orchords-tip-panel" hidden role="dialog" aria-label="Tip jar">
    <div class="orchords-tip-head">
      <strong>Support ORCHORDS</strong>
      <button type="button" id="orchords-tip-close" aria-label="Close">×</button>
    </div>
    <p class="orchords-tip-blurb">One-time, no signup, no platform in the middle. Pick a chain:</p>
    <div class="orchords-tip-grid">
      <a class="orchords-tip-tile" href="solana:DxQRGWyCF9hqvrJExSxiaac1ZFf8NiUmpRcZFPRU4xaq" target="_blank" rel="noopener">
        <img src="./assets/qr-sol.png" alt="Solana QR" width="120" height="120" />
        <span>Solana</span>
        <code>DxQRG...U4xaq</code>
      </a>
      <a class="orchords-tip-tile" href="ethereum:0x9aE64EFEf05E0ac980843FE3c7C03D9C0C8D1BC3" target="_blank" rel="noopener">
        <img src="./assets/qr-eth.png" alt="Ethereum QR" width="120" height="120" />
        <span>Ethereum</span>
        <code>0x9aE6...1BC3</code>
      </a>
      <a class="orchords-tip-tile" href="bitcoin:bc1qp3pran7r2tw2s6x95p3lfr8zw34u74tpxttu3r" target="_blank" rel="noopener">
        <img src="./assets/qr-btc.png" alt="Bitcoin QR" width="120" height="120" />
        <span>Bitcoin</span>
        <code>bc1qp...xttu3r</code>
      </a>
    </div>
    <p class="orchords-tip-foot">On-chain tips are public. Use a fresh wallet if you want privacy from your tip.</p>
  </div>
</div>

<style>
  #orchords-tip {
    position: fixed;
    right: 20px;
    bottom: 20px;
    z-index: 9999;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  #orchords-tip-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: #000;
    color: #fff;
    border: 0;
    border-radius: 999px;
    cursor: pointer;
    font-size: 14px;
    box-shadow: 0 4px 16px rgba(0,0,0,.25);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  #orchords-tip-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,.3); }
  #orchords-tip-btn:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
  #orchords-tip-panel {
    position: absolute;
    right: 0;
    bottom: calc(100% + 12px);
    width: min(360px, calc(100vw - 40px));
    background: #fff;
    color: #111;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0,0,0,.2);
    padding: 16px;
  }
  #orchords-tip-panel[hidden] { display: none; }
  .orchords-tip-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  #orchords-tip-close { background: none; border: 0; font-size: 20px; line-height: 1; cursor: pointer; padding: 4px 8px; }
  .orchords-tip-blurb { font-size: 13px; color: #555; margin: 0 0 12px; }
  .orchords-tip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .orchords-tip-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 8px;
    border: 1px solid #eee;
    border-radius: 8px;
    text-decoration: none;
    color: #111;
    transition: border-color .15s ease, background .15s ease;
  }
  .orchords-tip-tile:hover { border-color: #000; background: #fafafa; }
  .orchords-tip-tile img { width: 100%; max-width: 120px; height: auto; aspect-ratio: 1/1; margin-bottom: 6px; }
  .orchords-tip-tile span { font-size: 12px; font-weight: 600; }
  .orchords-tip-tile code { font-size: 10px; color: #666; margin-top: 2px; word-break: break-all; }
  .orchords-tip-foot { font-size: 11px; color: #888; margin: 12px 0 0; }
  @media (prefers-color-scheme: dark) {
    #orchords-tip-panel { background: #111; color: #f5f5f5; border-color: #333; }
    .orchords-tip-tile { border-color: #333; color: #f5f5f5; }
    .orchords-tip-tile:hover { background: #1a1a1a; }
    .orchords-tip-blurb { color: #bbb; }
    .orchords-tip-foot { color: #888; }
  }
</style>

<script>
  (function () {
    const btn = document.getElementById('orchords-tip-btn');
    const panel = document.getElementById('orchords-tip-panel');
    const close = document.getElementById('orchords-tip-close');
    if (!btn || !panel) return;
    function open() { panel.hidden = false; btn.setAttribute('aria-expanded', 'true'); }
    function shut() { panel.hidden = true; btn.setAttribute('aria-expanded', 'false'); }
    btn.addEventListener('click', function () { panel.hidden ? open() : shut(); });
    close.addEventListener('click', shut);
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') shut(); });
  })();
</script>
